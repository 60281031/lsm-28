
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이승민 · No.28 · 삼성 라이온즈</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #074CA1;
      --red: #C8102E;
      --gold: #F0B429;
      --dark: #080C14;
      --card: #0f1623;
      --text: #e8eaf0;
      --muted: #7a8299;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #020810 0%, #0a1628 50%, #061020 100%);
    }

    .hero-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 80% at 70% 50%, rgba(7,76,161,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(200,16,46,0.15) 0%, transparent 60%);
    }

    /* diagonal stripe accent */
    .hero-bg::after {
      content: '';
      position: absolute;
      top: -20%;
      right: -5%;
      width: 55%;
      height: 140%;
      background: linear-gradient(160deg, rgba(7,76,161,0.18) 0%, rgba(7,76,161,0.05) 40%, transparent 70%);
      transform: skewX(-8deg);
    }

    .hero-number {
      position: absolute;
      right: -2%;
      top: 50%;
      transform: translateY(-55%);
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(180px, 28vw, 380px);
      color: rgba(255,255,255,0.035);
      line-height: 1;
      user-select: none;
      letter-spacing: -0.04em;
    }

    .hero-photo {
      position: absolute;
      right: 4%;
      bottom: 0;
      height: 92%;
      object-fit: contain;
      object-position: bottom center;
      filter: drop-shadow(-20px 0 60px rgba(7,76,161,0.5));
      animation: floatIn 1s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 0 5% 6%;
      animation: fadeUp .9s .2s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-team {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .hero-name {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(52px, 10vw, 110px);
      line-height: .95;
      letter-spacing: -.02em;
    }

    .hero-name span {
      display: block;
      font-size: clamp(16px, 3vw, 28px);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      letter-spacing: .12em;
      color: var(--muted);
      margin-top: 8px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      padding: 6px 14px;
      border: 1px solid rgba(7,76,161,0.6);
      border-radius: 4px;
      background: rgba(7,76,161,0.15);
      font-size: 12px;
      letter-spacing: .1em;
      color: #a8c4f0;
    }

    .hero-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
    }

    /* ── STATS STRIP ── */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      animation: fadeUp .9s .4s cubic-bezier(.22,1,.36,1) both;
    }

    .stat-item {
      padding: 28px 0;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.06);
      transition: background .2s;
    }

    .stat-item:last-child { border-right: none; }
    .stat-item:hover { background: rgba(7,76,161,0.08); }

    .stat-value {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(24px, 4vw, 40px);
      color: #fff;
      letter-spacing: -.02em;
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: .2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── SECTION ── */
    .section {
      max-width: 960px;
      margin: 0 auto;
      padding: 60px 5%;
    }

    .section-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 13px;
      letter-spacing: .3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    /* ── GAME LIST ── */
    .game-list { display: flex; flex-direction: column; gap: 2px; }

    .game-row {
      display: grid;
      grid-template-columns: 56px 80px 1fr 56px 56px 56px 100px;
      align-items: center;
      padding: 14px 20px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 6px;
      font-size: 13px;
      gap: 8px;
      transition: border-color .2s, background .2s;
      cursor: default;
    }

    .game-row:hover {
      border-color: rgba(7,76,161,0.4);
      background: #131d2e;
    }

    .game-row.header {
      background: transparent;
      border: none;
      font-size: 10px;
      letter-spacing: .15em;
      color: var(--muted);
      text-transform: uppercase;
      padding-bottom: 6px;
      cursor: default;
    }

    .game-row.header:hover { background: transparent; border-color: transparent; }

    .result-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 12px;
    }

    .result-w { background: rgba(7,76,161,0.3); color: #7ab0ff; border: 1px solid rgba(7,76,161,0.5); }
    .result-l { background: rgba(200,16,46,0.25); color: #ff8099; border: 1px solid rgba(200,16,46,0.4); }
    .result-h { background: rgba(240,180,41,0.2); color: var(--gold); border: 1px solid rgba(240,180,41,0.35); }
    .result-nd { background: rgba(255,255,255,0.07); color: var(--muted); border: 1px solid rgba(255,255,255,0.1); }

    .label-chip {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 10px;
      letter-spacing: .05em;
      background: rgba(7,76,161,0.2);
      color: #7ab0ff;
      border: 1px solid rgba(7,76,161,0.3);
    }

    .col-num { color: var(--muted); font-size: 11px; }
    .col-center { text-align: center; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 40px 20px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .1em;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .stats-strip { grid-template-columns: repeat(2, 1fr); }
      .game-row {
        grid-template-columns: 44px 68px 1fr 44px 44px 44px;
        font-size: 12px;
        padding: 12px 12px;
        gap: 4px;
      }
      /* hide label column on mobile */
      .game-row > :last-child { display: none; }
      .hero-photo { right: -4%; height: 75%; }
    }
  </style>
</head>
<body>

<!-- ══ HERO ══ -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-number">28</div>

  <!--
    ★ 이승민 선수 사진을 여기에 넣으세요!
    사진 파일 이름을 'lsm.png' 으로 바꿔서 GitHub에 올린 뒤
    아래 src="lsm.png" 부분을 맞춰주세요.
    (배경이 투명한 PNG 파일이 가장 예쁘게 나와요)
  -->
  <!-- <img class="hero-photo" src="lsm.png" alt="이승민" /> -->

  <div class="hero-content">
    <p class="hero-team">Samsung Lions · 2026</p>
    <h1 class="hero-name">
      이승민
      <span>LEE SEUNG-MIN</span>
    </h1>
    <div class="hero-badge">No.28 · 좌완 불펜</div>
  </div>
</section>

<!-- ══ STATS STRIP ══ -->
<div class="stats-strip">
  <div class="stat-item">
    <div class="stat-value" id="stat-era">-</div>
    <div class="stat-label">ERA</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="stat-record">-</div>
    <div class="stat-label">승·홀드·패</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="stat-innings">-</div>
    <div class="stat-label">이닝</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="stat-k">-</div>
    <div class="stat-label">삼진</div>
  </div>
</div>

<!-- ══ GAME LOG ══ -->
<div class="section">
  <div class="section-title">등판 기록</div>

  <div class="game-list">
    <!-- 헤더 -->
    <div class="game-row header">
      <span>결과</span>
      <span>날짜</span>
      <span>상대</span>
      <span class="col-center">이닝</span>
      <span class="col-center">자책</span>
      <span class="col-center">투구수</span>
      <span></span>
    </div>
    <!-- 경기 행들은 JS가 채워줌 -->
  </div>
</div>

<footer>
  © 2026 이승민 팬사이트 · 삼성 라이온즈 No.28
</footer>

<script>
  /* ════════════════════════════════
     ★ 여기에 시즌 성적을 입력하세요!
     ════════════════════════════════ */
  const SEASON = {
    era:     "1.10",      // 예: "2.45"
    record:  "1승 4홀드 0패",      // 예: "2승 8홀드 1패"
    innings: "16.1",      // 예: "33"
    k:       "10",      // 예: "29"
  };

  /* ════════════════════════════════
     ★ 등판한 경기마다 아래처럼 추가하세요!
     result: "승" | "패" | "홀드" | "ND"
     ════════════════════════════════ */
  const GAMES = [
    // { date:"4.01", opponent:"두산", result:"홀드", innings:"1⅓", er:0, pitches:20, label:"멀티아웃" },
    // { date:"4.05", opponent:"KT",   result:"홀드", innings:"1",   er:0, pitches:16, label:"" },
    // { date:"4.10", opponent:"KIA",  result:"ND",   innings:"1⅔", er:1, pitches:28, label:"" },
  ];

  /* ── 렌더 ── */
  function resultClass(r) {
    if (r === "승") return "result-w";
    if (r === "패") return "result-l";
    if (r === "홀드") return "result-h";
    return "result-nd";
  }

  document.getElementById("stat-era").textContent    = SEASON.era;
  document.getElementById("stat-record").textContent = SEASON.record;
  document.getElementById("stat-innings").textContent= SEASON.innings;
  document.getElementById("stat-k").textContent      = SEASON.k;

  const list = document.querySelector(".game-list");
  if (GAMES.length === 0) {
    const empty = document.createElement("div");
    empty.style.cssText = "text-align:center;padding:48px 0;color:#7a8299;font-size:13px;letter-spacing:.08em;";
    empty.textContent = "등판 기록을 입력해주세요";
    list.appendChild(empty);
  } else {
    GAMES.forEach(g => {
      const row = document.createElement("div");
      row.className = "game-row";
      row.innerHTML = `
        <span><span class="result-badge ${resultClass(g.result)}">${g.result}</span></span>
        <span style="color:#a0aec0">${g.date}</span>
        <span>${g.opponent}</span>
        <span class="col-center">${g.innings}</span>
        <span class="col-center" style="color:${g.er===0?'#7ab0ff':g.er>=3?'#ff8099':'inherit'}">${g.er}</span>
        <span class="col-center col-num">${g.pitches}</span>
        <span>${g.label ? `<span class="label-chip">${g.label}</span>` : ''}</span>
      `;
      list.appendChild(row);
    });
  }
</script>
</body>
</html>
