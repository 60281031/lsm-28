name: 이승민 성적 자동 업데이트

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 필요한 패키지 설치
        run: pip install requests beautifulsoup4

      - name: 성적 업데이트 실행
        run: python update_stats.py

      - name: 변경사항 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "⚾ 이승민 성적 자동 업데이트 $(date +'%Y.%m.%d')"
          git push
